version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: signflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: signflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U signflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [signflow_net]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [signflow_net]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-signflow}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-signflow-secret}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [signflow_net]

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh /init-buckets.sh
    volumes:
      - ./minio/init-buckets.sh:/init-buckets.sh:ro
      - ./minio/public-uploads-policy.json:/init-policy.json:ro
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-signflow}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-signflow-secret}
    networks: [signflow_net]

  migrate:
    build:
      context: ..
      dockerfile: infra/Dockerfile.migrate
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://signflow:${POSTGRES_PASSWORD:-secret}@postgres:5432/signflow
    restart: on-failure
    networks: [signflow_net]

  admin:
    build:
      context: ..
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://signflow:${POSTGRES_PASSWORD:-secret}@postgres:5432/signflow
      TENANT_DATABASE_URL: postgresql://signflow:${POSTGRES_PASSWORD:-secret}@postgres:5432/signflow
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: "9000"
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: signflow-assets
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks: [signflow_net]

  player:
    build:
      context: ..
      dockerfile: apps/player/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-}
    restart: unless-stopped
    depends_on:
      admin:
        condition: service_healthy
    env_file: ../.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks: [signflow_net]

  nginx:
    image: nginx:alpine
    container_name: signflow-nginx
    restart: unless-stopped
    depends_on:
      admin:
        condition: service_healthy
      player:
        condition: service_healthy
    # Published on host port 80 — Nginx Proxy Manager runs on a separate
    # machine and reaches this VPS over the network on that port, terminating
    # SSL on its end. See NPM_SETUP.md.
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks: [signflow_net]

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  signflow_net:
    driver: bridge
