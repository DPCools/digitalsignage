events { worker_connections 1024; }

http {
  upstream admin   { server admin:3000; }
  upstream gateway { server admin:3002; }
  upstream player  { server player:3001; }
  upstream minio   { server minio:9000; }

  # Player app gets its own subdomain (player.<your-domain>) rather than a
  # path prefix under the main domain. Both admin and player are separate
  # Next.js apps that each generate /_next/static/... asset URLs at their
  # own root — sharing one origin means those collide (whichever app isn't
  # matched by the catch-all location 404s on its own JS/CSS). A dedicated
  # subdomain also lets the player app's PWA manifest/service worker use
  # their natural root scope instead of a rewritten path prefix.
  server {
    listen 80;
    server_name ~^player\.;
    client_max_body_size 2g;

    location /socket.io/ {
      proxy_pass http://gateway;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 86400;
    }

    location / {
      proxy_pass http://player;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }

  server {
    # default_server: nginx serves this block for any Host header that
    # doesn't match another server_name (exact/wildcard/regex) on this
    # listen socket. Without this, the *first* server block in the file
    # silently becomes the default instead — which sent every admin
    # request to the player app the moment the player. block above was
    # added, since "bigmotoringworld..." matches neither "^player\." nor
    # the literal string "_" (server_name _ has no special meaning on its
    # own; it's just a conventional placeholder name).
    listen 80 default_server;
    server_name _;
    client_max_body_size 2g;

    location /socket.io/ {
      proxy_pass http://gateway;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 86400;
    }

    # Legacy path-based access — kept for compatibility, but its
    # /_next/static/... assets will 404 (see comment above). Use the
    # player.<domain> subdomain instead.
    location /play/ {
      proxy_pass http://player;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /pair {
      proxy_pass http://player;
      proxy_set_header Host $host;
    }

    location /minio/ {
      proxy_pass http://minio/;
      # Presigned MinIO URLs (uploads) are SigV4-signed with SignedHeaders=host
      # against the *internal* endpoint (minio:9000 — see
      # apps/admin/src/lib/minio.ts, which only string-replaces the base URL,
      # it doesn't re-sign). Forwarding the public Host here instead would
      # make MinIO recompute a different signature and reject every upload
      # with SignatureDoesNotMatch, so this must stay hardcoded to match
      # exactly what the SDK signed against, regardless of which public
      # domain/path the browser used to reach nginx.
      proxy_set_header Host minio:9000;
      add_header Cache-Control "public, max-age=31536000, immutable";
      # Uploaded assets are already anonymously public (bucket policy grants
      # s3:GetObject on uploads/*) — this only lets browser JS *read* bytes it
      # could already fetch directly. Needed for: player-side snapshot capture
      # (html2canvas's useCORS image loading was silently skipping every image
      # without this, producing near-blank snapshots) and offline video caching
      # (assetCache.ts's fetch(..., { mode: 'cors' }) prefetch).
      add_header 'Access-Control-Allow-Origin' '*' always;
    }

    location / {
      proxy_pass http://admin;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
